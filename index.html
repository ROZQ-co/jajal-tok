<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kusuma Invitation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            height: 100%; 
            font-family: 'Arial', sans-serif; 
            background: #000; 
            color: white; 
            overflow: hidden; 
        }

        .container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 3;
            padding: 20px;
        }

        .btn {
            background: #d4af37;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            font-size: 1rem;
        }

        #halaman1 { background: #111; z-index: 10; }
        
        /* Nama Tamu Styling */
        #namaTamu {
            font-size: 2.5rem;
            margin-top: 10px;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<!-- File Musik -->
<audio id="musikLatar" loop>
    <source src="Lestari.mp3" type="audio/mpeg">
    Browser Anda tidak mendukung elemen audio.
</audio>

<div class="container" id="mainContainer">
    
    <!-- HALAMAN 1 -->
    <section id="halaman1">
        <div class="content">
            <h1>Kusuma Invitation</h1>
            <p style="margin-bottom: 20px;">Digital Video Invitation</p>
            <button class="btn" onclick="mulaiUndangan()">BUKA UNDANGAN</button>
        </div>
    </section>

    <!-- HALAMAN 2 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202.mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="content">
            <p>Spesial Untuk:</p>
            <h2 id="namaTamu">Nama Tamu</h2>
        </div>
    </section>

    <!-- HALAMAN 3 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202%20(2).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </section>

    <!-- HALAMAN 4 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202%20(3).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </section>

    <!-- HALAMAN 5 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202%20(4).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </section>

    <!-- HALAMAN 6 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202%20(5).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </section>

    <!-- HALAMAN 7 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202%20(6).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </section>

    <!-- HALAMAN 8 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202%20(7).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
    </section>

    <!-- HALAMAN 9 -->
    <section>
        <video loop playsinline class="bg-vid">
            <source src="https://raw.githubusercontent.com/ROZQ-co/jajal-tok/main/halaman%202%20(9).mp4" type="video/mp4">
        </video>
        <div class="overlay"></div>
        <div class="content">
            <a href="https://wa.me/628123456789" class="btn">KONFIRMASI KEHADIRAN (RSVP)</a>
        </div>
    </section>

</div>

<script>
    // Ambil nama dari URL ?to=Nama
    const urlParams = new URLSearchParams(window.location.search);
    document.getElementById('namaTamu').innerText = urlParams.get('to') || "Tamu Undangan";

    const container = document.getElementById('mainContainer');
    const videos = document.querySelectorAll('.bg-vid');
    const audio = document.getElementById('musikLatar');

    // Kunci scroll di awal
    container.style.overflowY = 'hidden';

    function mulaiUndangan() {
        // Buka kunci scroll
        container.style.overflowY = 'scroll';
        
        // Putar Musik
        audio.play().catch(e => console.log("Audio play diblokir browser:", e));

        // Pindah ke Halaman 2
        container.children[1].scrollIntoView({ behavior: 'smooth' });
        
        // Putar video yang aktif
        checkVideos();
    }

    function checkVideos() {
        videos.forEach(v => {
            const pos = v.getBoundingClientRect();
            // Video diputar hanya jika halaman terlihat di layar
            if(pos.top < window.innerHeight && pos.bottom > 0) {
                v.play();
                v.muted = true; // Video di-mute agar tidak bentrok dengan musik Lestari.mp3
            } else {
                v.pause();
            }
        });
    }

    container.addEventListener('scroll', checkVideos);
</script>

</body>
</html>
