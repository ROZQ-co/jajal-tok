<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Jawa Ultimate</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:#120c06;color:#fff;overflow-x:hidden}
section{min-height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:40px 20px;position:relative;overflow:hidden}

/* ===== BATIK 3D PREMIUM ===== */
.batik-bg{
position:absolute;inset:0;z-index:0;
background:
radial-gradient(circle at 20% 30%, rgba(212,175,55,.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(212,175,55,.2), transparent 40%),
url('https://static.vecteezy.com/system/resources/thumbnails/045/771/399/small_2x/indonesian-javanese-culture-golden-gunungan-wayang-shapes-free-png.png');
animation:batikMove 25s linear infinite;
opacity:.35;
filter:contrast(120%) brightness(90%);
}

@keyframes batikMove{
0%{transform:translate(0,0) scale(1)}
50%{transform:translate(-60px,-40px) scale(1.05)}
100%{transform:translate(0,0) scale(1)}
}

/* LAYER DEPTH (3D FEEL) */
.layer-glow{
position:absolute;inset:0;z-index:1;
background:radial-gradient(circle at center, rgba(212,175,55,.15), transparent 70%);
animation:glowPulse 6s ease-in-out infinite;
}

@keyframes glowPulse{
0%,100%{opacity:.6}
50%{opacity:1}
}

/* WAYANG HIDUP */
.wayang{position:absolute;bottom:0;width:130px;opacity:.3;z-index:1;animation:floatWayang 6s ease-in-out infinite}
.wayang.left{left:10px}
.wayang.right{right:10px;transform:scaleX(-1)}

@keyframes floatWayang{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-20px)}
}

.cover{
background:linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.8)),
url('https://images.unsplash.com/photo-1519225421980-715cb0215aed');
background-size:cover;background-position:center;
}

.box{
max-width:700px;padding:40px;border-radius:25px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
border:1px solid rgba(212,175,55,.4);
box-shadow:0 0 50px rgba(212,175,55,.25);
position:relative;z-index:2;
}

h1{font-family:'Playfair Display',serif;font-size:52px;color:#d4af37;margin:15px 0}
h2{font-size:28px;color:#d4af37;margin-bottom:10px}
p{font-size:18px;line-height:1.6}
.nama{font-size:32px;font-weight:bold;margin:15px 0}

.btn{margin-top:20px;padding:14px 35px;border:none;border-radius:30px;background:#d4af37;color:black;cursor:pointer;font-weight:bold;transition:.3s}
.btn:hover{transform:scale(1.1)}

.animate{opacity:0;transform:translateY(40px);transition:1s}
.show{opacity:1;transform:translateY(0)}
.timer{font-size:26px;margin-top:15px;color:#d4af37;font-weight:bold}

@media(max-width:480px){h1{font-size:34px}h2{font-size:22px}p{font-size:16px}.nama{font-size:24px}}
</style>
</head>

<body>

<audio id="musik" loop>
<source src="lestari.mp3" type="audio/mpeg">
</audio>

<section class="cover">
<div class="batik-bg"></div>
<div class="layer-glow"></div>
<img class="wayang left" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">
<img class="wayang right" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">

<div class="box">
<p class="animate">The Wedding Of</p>
<h1 class="animate">Trimono & Puji</h1>
<p class="animate">Kepada Yth.</p>
<div class="nama animate" id="guest">Tamu Undangan</div>
<button class="btn animate" onclick="bukaUndangan()">Buka Undangan</button>
</div>
</section>

<section>
<div class="batik-bg"></div>
<div class="layer-glow"></div>
<img class="wayang left" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">
<img class="wayang right" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">

<div class="box">
<h2 class="animate">Mempelai</h2>
<p class="animate"><b>Trimono</b></p>
<p class="animate">Putra dari Bapak Saeno & Ibu Suwarni</p>
<br>
<p class="animate"><b>Puji Rahayu</b></p>
<p class="animate">Putri dari Ibu Sukinem</p>
</div>
</section>

<section>
<div class="batik-bg"></div>
<div class="layer-glow"></div>
<img class="wayang left" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">
<img class="wayang right" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">

<div class="box">
<h2 class="animate">Acara</h2>
<p class="animate">Kamis, 28 Mei 2026</p>
<p class="animate">Ngawi</p>
<div class="timer animate" id="timer"></div>
</div>
</section>

<section>
<div class="batik-bg"></div>
<div class="layer-glow"></div>
<img class="wayang left" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">
<img class="wayang right" src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Wayang_Bima.png">

<div class="box">
<h2 class="animate">Terima Kasih</h2>
<p class="animate">Merupakan kehormatan bagi kami atas kehadiran dan doa restu Anda.</p>
<a id="wa" target="_blank"><button class="btn">Kirim Ucapan via WhatsApp</button></a>
</div>
</section>

<script>
function bukaUndangan(){
const musik=document.getElementById("musik");
musik.play().catch(()=>{});
window.scrollTo({top:window.innerHeight,behavior:"smooth"});
}

const params=new URLSearchParams(window.location.search);
const nama=params.get("to")||"Tamu Undangan";
document.getElementById("guest").innerText=nama;

const noWa="6281234567890";
const pesan=`Assalamu'alaikum, saya ${nama} siap hadir di acara pernikahan Trimono & Puji.`;
document.getElementById("wa").href=`https://wa.me/${noWa}?text=${encodeURIComponent(pesan)}`;

window.addEventListener("load",()=>{
document.querySelectorAll(".cover .animate").forEach((el,i)=>{
setTimeout(()=>{el.classList.add("show")},i*200)
})
})

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.querySelectorAll('.animate').forEach((el,i)=>{
setTimeout(()=>{el.classList.add('show')},i*150)
})
}
})
},{threshold:.3})

document.querySelectorAll("section").forEach(sec=>observer.observe(sec))

const tujuan=new Date("May 28, 2026 08:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let jarak=tujuan-now;
if(jarak<0){document.getElementById("timer").innerHTML="Acara Selesai";return}
let h=Math.floor(jarak/(1000*60*60*24));
let j=Math.floor((jarak%(1000*60*60*24))/(1000*60*60));
let m=Math.floor((jarak%(1000*60*60))/(1000*60));
let d=Math.floor((jarak%(1000*60))/1000);
document.getElementById("timer").innerHTML=`${h} Hari ${j} Jam ${m} Menit ${d} Detik`;
},1000)
</script>

</body>
</html>
